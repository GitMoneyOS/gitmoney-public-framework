<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">GitMoneyOS founder control for AI-assisted work</title>
  <desc id="desc">Three connected rooms show a private notebook, bounded work desk, and official company record.</desc>
  <defs>
    <radialGradient id="glow" cx="85%" cy="12%" r="70%">
      <stop offset="0" stop-color="#3a3154"/>
      <stop offset="0.46" stop-color="#151820"/>
      <stop offset="1" stop-color="#0b0c0f"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#20242e"/>
      <stop offset="1" stop-color="#111319"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <text x="72" y="76" fill="#f4c95d" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" letter-spacing="4">GITMONEYOS PUBLIC FRAMEWORK</text>
  <text x="72" y="164" fill="#f7f2e8" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="800">Make AI work official.</text>
  <text x="72" y="216" fill="#c8c1b4" font-family="Arial, Helvetica, sans-serif" font-size="27">Founder control for owned, reviewable business assets.</text>

  <g transform="translate(72 286)">
    <rect width="330" height="230" rx="24" fill="url(#panel)" stroke="#4a5061" stroke-width="2"/>
    <circle cx="44" cy="44" r="22" fill="#f4c95d"/>
    <text x="44" y="52" text-anchor="middle" fill="#17130a" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">1</text>
    <text x="32" y="104" fill="#f7f2e8" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800">Private Notebook</text>
    <text x="32" y="146" fill="#c8c1b4" font-family="Arial, Helvetica, sans-serif" font-size="20">Source memory</text>
    <text x="32" y="177" fill="#c8c1b4" font-family="Arial, Helvetica, sans-serif" font-size="20">and unfinished thinking</text>
    <text x="32" y="210" fill="#8bd3a5" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">PRIVATE BY DEFAULT</text>
  </g>

  <path d="M422 401 H459" stroke="#f4c95d" stroke-width="5" stroke-linecap="round"/>
  <path d="M451 391 L464 401 L451 411" fill="none" stroke="#f4c95d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(475 286)">
    <rect width="330" height="230" rx="24" fill="url(#panel)" stroke="#4a5061" stroke-width="2"/>
    <circle cx="44" cy="44" r="22" fill="#f4c95d"/>
    <text x="44" y="52" text-anchor="middle" fill="#17130a" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">2</text>
    <text x="32" y="104" fill="#f7f2e8" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800">Work Desk</text>
    <text x="32" y="146" fill="#c8c1b4" font-family="Arial, Helvetica, sans-serif" font-size="20">Human and agent drafts</text>
    <text x="32" y="177" fill="#c8c1b4" font-family="Arial, Helvetica, sans-serif" font-size="20">inside explicit boundaries</text>
    <text x="32" y="210" fill="#8bd3a5" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">REVIEW BEFORE APPROVAL</text>
  </g>

  <path d="M825 401 H862" stroke="#f4c95d" stroke-width="5" stroke-linecap="round"/>
  <path d="M854 391 L867 401 L854 411" fill="none" stroke="#f4c95d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(878 286)">
    <rect width="330" height="230" rx="24" fill="url(#panel)" stroke="#4a5061" stroke-width="2"/>
    <circle cx="44" cy="44" r="22" fill="#f4c95d"/>
    <text x="44" y="52" text-anchor="middle" fill="#17130a" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">3</text>
    <text x="32" y="104" fill="#f7f2e8" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800">Company Record</text>
    <text x="32" y="146" fill="#c8c1b4" font-family="Arial, Helvetica, sans-serif" font-size="20">Approved assets, decisions,</text>
    <text x="32" y="177" fill="#c8c1b4" font-family="Arial, Helvetica, sans-serif" font-size="20">history, and evidence</text>
    <text x="32" y="210" fill="#8bd3a5" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">OWNED AND REVIEWABLE</text>
  </g>

  <text x="72" y="580" fill="#f7f2e8" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Private memory → bounded work → official business evidence</text>
</svg>
