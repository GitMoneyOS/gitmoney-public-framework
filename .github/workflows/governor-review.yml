# Monthly Governor Review — deterministic scheduled receipt.
# AVSM check: cron trigger, one API call, no agents, issues:write only.
# Takes effect only when pushed to the default branch and Actions are enabled (owner action).
name: Monthly Governor Review

on:
  schedule:
    - cron: "0 14 1 * *" # 1st of each month, 14:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  open-review-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Open the monthly review issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Governor] Monthly review ${today}`,
              labels: ["type:governor-review"],
              body: [
                "Monthly governance review for the public framework.",
                "",
                "## Review Checklist",
                "",
                "- [ ] Review completion signals filed since last month (score-completed, first-official-asset, self-heal-run)",
                "- [ ] Summarize signal counts in the Healing Dashboard",
                "- [ ] Review open risks and stale issues",
                "- [ ] Confirm public docs still match approved offer language",
                "- [ ] Confirm no private or client data has entered public artifacts",
                "- [ ] Name the next highest-leverage gap",
                "",
                "Close this issue with a plain-English summary as the governance receipt."
              ].join("\n")
            });
